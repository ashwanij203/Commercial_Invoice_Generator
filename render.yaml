services:
  # ─── Backend: Express API ────────────────────────────────────────────────────
  - type: web
    name: jaiswal-billing-backend
    env: node
    region: singapore          # closest to India
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000            # Render always uses port 10000 internally
      - key: MONGODB_URI
        sync: false             # Set this manually in the Render dashboard
      - key: JWT_SECRET
        sync: false             # Set this manually in the Render dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        value: https://jaiswal-billing-frontend.onrender.com   # update after deploy

  # ─── Frontend: React + Vite (Static Site) ────────────────────────────────────
  - type: web
    name: jaiswal-billing-frontend
    env: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA fallback for React Router
    envVars:
      - key: VITE_API_URL
        value: https://jaiswal-billing-backend.onrender.com   # update after backend deploy
